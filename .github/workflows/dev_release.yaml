name: Dev Release

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - firmware/**

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: dev-release-firmware
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - board: pico
            suffix: rp2040
            first: true
          - board: pico2
            suffix: rp2350
            first: false

    env:
      FIRMWARE_FILENAME: picomso-${{ matrix.suffix }}.uf2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodules
        run: |
          git submodule status
          test -d external/pico-sdk

      - name: Build firmware
        uses: samyarsadat/Pico-Build-Action@v1
        with:
          source_dir: "firmware/app"
          output_dir: "build"
          cmake_args: "-DCMAKE_BUILD_TYPE=Release -DPICO_BOARD=${{ matrix.board }}"

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp firmware/app/build/*.uf2 dist/${{ env.FIRMWARE_FILENAME }}

      - name: Generate attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/${{ env.FIRMWARE_FILENAME }}
          github-token: ${{ secrets.TOKEN }}

      - name: Write release body
        if: matrix.first
        run: |
          cat > release_body.md << EOF
          Development (auto)

          Firmware:
          - commit: "${{ github.event.head_commit.message }}"
          - commit-url: "https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          EOF

      - name: Publish first artifact (creates release)
        if: matrix.first
        uses: ncipollo/release-action@v1
        with:
          tag: dev-latest
          name: Development (auto)
          prerelease: true
          allowUpdates: true
          commit: ${{ github.sha }}
          artifacts: dist/${{ env.FIRMWARE_FILENAME }}
          replacesArtifacts: true
          generateReleaseNotes: false
          bodyFile: release_body.md

      - name: Publish second artifact (append)
        if: ${{ !matrix.first }}
        uses: ncipollo/release-action@v1
        with:
          tag: dev-latest
          name: Development (auto)
          prerelease: true
          allowUpdates: true
          commit: ${{ github.sha }}
          artifacts: dist/${{ env.FIRMWARE_FILENAME }}
          replacesArtifacts: false
          generateReleaseNotes: false